services:
  web:
    image: ghcr.io/japhethlg/churchflow-app:latest
    container_name: church-frontend
    restart: unless-stopped
    pull_policy: always
    ports:
      - "3002:3000"
    env_file:
      - .env.production
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
