<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ChurchFlow — Complete Color Palette</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; background: #ECEEF0; color: #191C1E; -webkit-font-smoothing: antialiased; }
    * { box-sizing: border-box; }
    .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // =========================================================================
    // SANCTUARY — Complete light + dark token system
    // =========================================================================

    const LIGHT = {
      // Brand
      primary:              '#3525CD',
      primaryContainer:     '#4F46E5',
      primaryFixed:         '#E6E6FA',
      onPrimary:            '#FFFFFF',
      onPrimaryFixed:       '#2A1DA8',
      tertiary:             '#7E3000',
      tertiaryContainer:    '#FBE9DD',
      onTertiary:           '#FFFFFF',
      onTertiaryContainer:  '#7E3000',

      // Surfaces (warm-cool neutrals — light)
      surface:                  '#F7F9FB',
      surfaceContainerLowest:   '#FFFFFF',
      surfaceContainerLow:      '#F1F3F6',
      surfaceContainer:         '#ECEEF0',
      surfaceContainerHigh:     '#E4E7EB',
      surfaceContainerHighest:  '#DCE0E5',
      surfaceInverse:           '#191C1E',
      onSurfaceInverse:         '#F1F3F6',

      // Text
      onSurface:         '#191C1E',
      onSurfaceVariant:  '#42474E',
      onSurfaceMuted:    '#6B7280',
      outline:           '#72787E',
      outlineVariant:    '#C2C7CE',

      // Status
      success:           '#156B3D',
      successContainer:  '#C8EFD4',
      onSuccess:         '#FFFFFF',
      onSuccessContainer:'#0F4D2C',
      warning:           '#8B5A00',
      warningContainer:  '#FDE8B8',
      onWarning:         '#FFFFFF',
      onWarningContainer:'#6B4500',
      error:             '#8C1D18',
      errorContainer:    '#F9DEDC',
      onError:           '#FFFFFF',
      onErrorContainer:  '#6B130F',
      info:              '#1B4C8C',
      infoContainer:     '#D6E6FB',
      onInfo:            '#FFFFFF',
      onInfoContainer:   '#143768',

      // Transaction types
      txTithe:           '#4F46E5',
      txTitheBg:         '#E0E7FF',
      txTitheFg:         '#3730A3',
      txOffering:        '#16A34A',
      txOfferingBg:      '#D1FAE5',
      txOfferingFg:      '#065F46',
      txMission:         '#2563EB',
      txMissionBg:       '#DBEAFE',
      txMissionFg:       '#1E40AF',
      txFirstFruit:      '#D97706',
      txFirstFruitBg:    '#FEF3C7',
      txFirstFruitFg:    '#92400E',
      txCommitment:      '#9333EA',
      txCommitmentBg:    '#EDE9FE',
      txCommitmentFg:    '#5B21B6',
      txDonation:        '#0D9488',
      txDonationBg:      '#CCFBF1',
      txDonationFg:      '#115E59',
      txOther:           '#6B7280',
      txOtherBg:         '#ECEEF0',
      txOtherFg:         '#42474E',
    };

    const DARK = {
      // Brand — primary lightens for legibility on dark; container becomes mid-tone; "fixed" stays close to brand color
      primary:              '#A29DEE',  // light enough to read on dark surface
      primaryContainer:     '#2A1DA8',  // deep brand for fills
      primaryFixed:         '#1F1583',  // navigation pill bg
      onPrimary:            '#1F1583',
      onPrimaryFixed:       '#C5C2F5',
      tertiary:             '#EFB585',
      tertiaryContainer:    '#5E2300',
      onTertiary:           '#3F1700',
      onTertiaryContainer:  '#FBE9DD',

      // Surfaces — neutral cool blacks, stepping UP in lightness with elevation (M3 model)
      surface:                  '#0F1214',  // page bg
      surfaceContainerLowest:   '#0A0C0E',
      surfaceContainerLow:      '#16191C',
      surfaceContainer:         '#1A1D20',
      surfaceContainerHigh:     '#23272B',
      surfaceContainerHighest:  '#2D3136',
      surfaceInverse:           '#DCE0E5',
      onSurfaceInverse:         '#191C1E',

      // Text
      onSurface:         '#E4E7EB',
      onSurfaceVariant:  '#B1B6BD',
      onSurfaceMuted:    '#7E848B',
      outline:           '#5C6168',
      outlineVariant:    '#2D3136',

      // Status — mid-tones brightened to read on dark; containers become deep & saturated with light fg
      success:           '#71D295',
      successContainer:  '#0A381F',
      onSuccess:         '#062414',
      onSuccessContainer:'#A1E3B8',
      warning:           '#F4BC3F',
      warningContainer:  '#4D3200',
      onWarning:         '#332100',
      onWarningContainer:'#FDE8B8',
      error:             '#E68B86',
      errorContainer:    '#4D0B08',
      onError:           '#330603',
      onErrorContainer:  '#F2B8B5',
      info:              '#80AFEE',
      infoContainer:     '#0D2647',
      onInfo:            '#07182E',
      onInfoContainer:   '#AFCDF7',

      // Transaction types — base hue brightened; container becomes deep tint
      txTithe:           '#A29DEE',
      txTitheBg:         '#1F1583',
      txTitheFg:         '#C5C2F5',
      txOffering:        '#71D295',
      txOfferingBg:      '#0A381F',
      txOfferingFg:      '#A1E3B8',
      txMission:         '#80AFEE',
      txMissionBg:       '#0D2647',
      txMissionFg:       '#AFCDF7',
      txFirstFruit:      '#F4BC3F',
      txFirstFruitBg:    '#4D3200',
      txFirstFruitFg:    '#FDE8B8',
      txCommitment:      '#C9A4F2',
      txCommitmentBg:    '#3B1E63',
      txCommitmentFg:    '#E2D2F9',
      txDonation:        '#5EEAD4',
      txDonationBg:      '#0F3B36',
      txDonationFg:      '#A4F1E2',
      txOther:           '#9AA1A9',
      txOtherBg:         '#23272B',
      txOtherFg:         '#B1B6BD',
    };

    // =========================================================================
    // ATOMS
    // =========================================================================

    const Swatch = ({ name, value, T, big }) => {
      // Decide if text on swatch should be light or dark
      const lum = (() => {
        const h = value.replace('#','');
        if (h.length !== 6) return 0.5;
        const r = parseInt(h.slice(0,2),16)/255;
        const g = parseInt(h.slice(2,4),16)/255;
        const b = parseInt(h.slice(4,6),16)/255;
        return 0.2126*r + 0.7152*g + 0.0722*b;
      })();
      const fg = lum > 0.55 ? '#191C1E' : '#FFFFFF';
      return (
        <div style={{
          background: value,
          borderRadius: 12,
          padding: big ? '20px 18px' : '14px 14px',
          minHeight: big ? 96 : 72,
          color: fg,
          display: 'flex', flexDirection: 'column', justifyContent: 'space-between',
          boxShadow: T === LIGHT
            ? 'inset 0 0 0 1px rgba(0,0,0,0.06)'
            : 'inset 0 0 0 1px rgba(255,255,255,0.06)',
        }}>
          <div style={{ fontSize: 12, fontWeight: 500, letterSpacing: '-0.005em', opacity: 0.95 }}>{name}</div>
          <div className="mono" style={{ fontSize: 10, opacity: 0.75, marginTop: big ? 24 : 12 }}>{value.toUpperCase()}</div>
        </div>
      );
    };

    const TokenRow = ({ tokens, T, cols = 4 }) => (
      <div style={{ display: 'grid', gridTemplateColumns: `repeat(${cols}, 1fr)`, gap: 10 }}>
        {tokens.map(([name, key]) => (
          <Swatch key={name} name={name} value={T[key]} T={T} />
        ))}
      </div>
    );

    // Section block — light or dark variant
    const Block = ({ T, mode, children, fullBleed }) => (
      <div style={{
        background: T.surface,
        color: T.onSurface,
        borderRadius: 24,
        padding: fullBleed ? 0 : '36px 40px',
        position: 'relative',
        overflow: 'hidden',
        boxShadow: mode === 'dark'
          ? '0 1px 0 rgba(255,255,255,0.04), 0 24px 48px -16px rgba(0,0,0,0.5)'
          : '0 1px 0 rgba(0,0,0,0.04), 0 12px 32px -16px rgba(0,0,0,0.08)',
      }}>
        {children}
      </div>
    );

    const ModeBadge = ({ mode, T }) => (
      <div style={{
        display: 'inline-flex', alignItems: 'center', gap: 8,
        padding: '6px 12px', borderRadius: 9999,
        background: T.surfaceContainerHigh, color: T.onSurfaceVariant,
        fontSize: 11, fontWeight: 600, letterSpacing: '0.08em', textTransform: 'uppercase',
      }}>
        <span style={{
          width: 10, height: 10, borderRadius: '50%',
          background: mode === 'dark' ? '#0A0C0E' : '#FFFFFF',
          boxShadow: `inset 0 0 0 1px ${T.outlineVariant}`,
        }} />
        {mode}
      </div>
    );

    const SectionTitle = ({ T, eyebrow, title, sub }) => (
      <div style={{ marginBottom: 20 }}>
        {eyebrow && (
          <div style={{ fontSize: 10, fontWeight: 600, letterSpacing: '0.12em', textTransform: 'uppercase', color: T.onSurfaceMuted, marginBottom: 8 }}>{eyebrow}</div>
        )}
        <h3 style={{ fontSize: 22, fontWeight: 600, letterSpacing: '-0.02em', color: T.onSurface, margin: 0, lineHeight: 1.2 }}>{title}</h3>
        {sub && <p style={{ fontSize: 13.5, color: T.onSurfaceVariant, lineHeight: 1.55, marginTop: 8, marginBottom: 0, maxWidth: 720 }}>{sub}</p>}
      </div>
    );

    // =========================================================================
    // SEMANTIC TOKEN GRID — full system per mode
    // =========================================================================

    const SemanticGrid = ({ T, mode }) => {
      const groups = [
        {
          name: 'Brand · Primary',
          tokens: [
            ['primary', 'primary'],
            ['primaryContainer', 'primaryContainer'],
            ['primaryFixed', 'primaryFixed'],
            ['onPrimary', 'onPrimary'],
            ['onPrimaryFixed', 'onPrimaryFixed'],
          ],
        },
        {
          name: 'Brand · Tertiary (Clay)',
          tokens: [
            ['tertiary', 'tertiary'],
            ['tertiaryContainer', 'tertiaryContainer'],
            ['onTertiary', 'onTertiary'],
            ['onTertiaryContainer', 'onTertiaryContainer'],
          ],
        },
        {
          name: 'Surfaces',
          tokens: [
            ['surface', 'surface'],
            ['surfaceContainerLowest', 'surfaceContainerLowest'],
            ['surfaceContainerLow', 'surfaceContainerLow'],
            ['surfaceContainer', 'surfaceContainer'],
            ['surfaceContainerHigh', 'surfaceContainerHigh'],
            ['surfaceContainerHighest', 'surfaceContainerHighest'],
            ['surfaceInverse', 'surfaceInverse'],
            ['onSurfaceInverse', 'onSurfaceInverse'],
          ],
        },
        {
          name: 'Text & Outline',
          tokens: [
            ['onSurface', 'onSurface'],
            ['onSurfaceVariant', 'onSurfaceVariant'],
            ['onSurfaceMuted', 'onSurfaceMuted'],
            ['outline', 'outline'],
            ['outlineVariant', 'outlineVariant'],
          ],
        },
        {
          name: 'Status · Success',
          tokens: [
            ['success', 'success'],
            ['successContainer', 'successContainer'],
            ['onSuccess', 'onSuccess'],
            ['onSuccessContainer', 'onSuccessContainer'],
          ],
        },
        {
          name: 'Status · Warning',
          tokens: [
            ['warning', 'warning'],
            ['warningContainer', 'warningContainer'],
            ['onWarning', 'onWarning'],
            ['onWarningContainer', 'onWarningContainer'],
          ],
        },
        {
          name: 'Status · Error',
          tokens: [
            ['error', 'error'],
            ['errorContainer', 'errorContainer'],
            ['onError', 'onError'],
            ['onErrorContainer', 'onErrorContainer'],
          ],
        },
        {
          name: 'Status · Info',
          tokens: [
            ['info', 'info'],
            ['infoContainer', 'infoContainer'],
            ['onInfo', 'onInfo'],
            ['onInfoContainer', 'onInfoContainer'],
          ],
        },
      ];

      return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 28 }}>
          {groups.map(g => (
            <div key={g.name}>
              <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: '0.08em', textTransform: 'uppercase', color: T.onSurfaceMuted, marginBottom: 10 }}>{g.name}</div>
              <TokenRow tokens={g.tokens} T={T} cols={4} />
            </div>
          ))}
        </div>
      );
    };

    // =========================================================================
    // TRANSACTION TYPE PALETTE
    // =========================================================================

    const TxnPalette = ({ T }) => {
      const types = [
        { name: 'Tithe',       base: 'txTithe',       bg: 'txTitheBg',       fg: 'txTitheFg' },
        { name: 'Offering',    base: 'txOffering',    bg: 'txOfferingBg',    fg: 'txOfferingFg' },
        { name: 'Mission',     base: 'txMission',     bg: 'txMissionBg',     fg: 'txMissionFg' },
        { name: 'First Fruit', base: 'txFirstFruit',  bg: 'txFirstFruitBg',  fg: 'txFirstFruitFg' },
        { name: 'Commitment',  base: 'txCommitment',  bg: 'txCommitmentBg',  fg: 'txCommitmentFg' },
        { name: 'Donation',    base: 'txDonation',    bg: 'txDonationBg',    fg: 'txDonationFg' },
        { name: 'Other',       base: 'txOther',       bg: 'txOtherBg',       fg: 'txOtherFg' },
      ];
      return (
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 10 }}>
          {types.map(t => (
            <div key={t.name}>
              {/* Base swatch */}
              <div style={{
                background: T[t.base], borderRadius: '12px 12px 0 0', height: 56,
                position: 'relative', overflow: 'hidden',
              }}>
                <div style={{
                  position: 'absolute', inset: 0,
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  fontSize: 11, fontWeight: 600,
                  color: '#fff', mixBlendMode: 'normal', opacity: 0.95,
                }} className="mono">{T[t.base].toUpperCase()}</div>
              </div>
              {/* Badge preview (bg + fg) */}
              <div style={{
                background: T[t.bg], color: T[t.fg],
                padding: '14px 12px', borderRadius: '0 0 12px 12px',
                display: 'flex', flexDirection: 'column', gap: 8, alignItems: 'center',
              }}>
                <span style={{
                  display: 'inline-flex', alignItems: 'center', gap: 6,
                  padding: '3px 10px', borderRadius: 9999,
                  background: T[t.bg], color: T[t.fg],
                  fontSize: 12, fontWeight: 500,
                  boxShadow: `inset 0 0 0 1px ${T.outlineVariant}33`,
                }}>
                  <span style={{ width: 6, height: 6, borderRadius: '50%', background: T[t.fg] }} />
                  {t.name}
                </span>
                <div style={{ fontSize: 11, color: T[t.fg], opacity: 0.85 }} className="mono">
                  bg / fg
                </div>
              </div>
            </div>
          ))}
        </div>
      );
    };

    // =========================================================================
    // COMPONENT PREVIEWS — render same components in light + dark
    // =========================================================================

    const Btn = ({ T, kind, children }) => {
      const styles = {
        primary: {
          background: `linear-gradient(135deg, ${T.primaryContainer}, ${T.primary === '#A29DEE' ? T.primaryContainer : T.primary})`,
          color: '#fff',
        },
        // override: in dark we want the gradient to use deeper tones for filled buttons
        primaryDark: {
          background: `linear-gradient(135deg, #4F46E5, #3525CD)`,
          color: '#fff',
          boxShadow: '0 6px 16px -4px rgba(53,37,205,0.55)',
        },
        primaryLight: {
          background: `linear-gradient(135deg, #4F46E5, #3525CD)`,
          color: '#fff',
          boxShadow: '0 6px 16px -4px rgba(53,37,205,0.4)',
        },
        secondary: { background: T.surfaceContainerHigh, color: T.onSurface },
        ghost: { background: 'transparent', color: T.onSurfaceVariant },
        danger: { background: T.error, color: T.onError },
      };
      const resolved = kind === 'primary'
        ? (T === LIGHT ? styles.primaryLight : styles.primaryDark)
        : styles[kind];
      return (
        <button style={{
          ...resolved,
          padding: '10px 18px', borderRadius: 9999,
          fontSize: 13.5, fontWeight: 500, letterSpacing: '-0.005em',
          border: 'none', cursor: 'pointer', fontFamily: 'inherit',
        }}>{children}</button>
      );
    };

    const Bdg = ({ T, bg, fg, children }) => (
      <span style={{
        display: 'inline-flex', alignItems: 'center', gap: 6,
        padding: '3px 10px', borderRadius: 9999,
        background: T[bg], color: T[fg],
        fontSize: 12, fontWeight: 500,
      }}>
        <span style={{ width: 6, height: 6, borderRadius: '50%', background: T[fg] }} />
        {children}
      </span>
    );

    const ComponentPreview = ({ T, mode }) => (
      <div style={{
        background: T.surface,
        color: T.onSurface,
        borderRadius: 16,
        padding: 28,
        display: 'flex', flexDirection: 'column', gap: 24,
      }}>
        {/* Buttons */}
        <div>
          <div style={{ fontSize: 10, fontWeight: 600, letterSpacing: '0.12em', textTransform: 'uppercase', color: T.onSurfaceMuted, marginBottom: 10 }}>Buttons</div>
          <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
            <Btn T={T} kind="primary">Record gift</Btn>
            <Btn T={T} kind="secondary">Filter</Btn>
            <Btn T={T} kind="ghost">Cancel</Btn>
            <Btn T={T} kind="danger">Delete</Btn>
          </div>
        </div>

        {/* Cards / surfaces */}
        <div>
          <div style={{ fontSize: 10, fontWeight: 600, letterSpacing: '0.12em', textTransform: 'uppercase', color: T.onSurfaceMuted, marginBottom: 10 }}>Surfaces · elevation</div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 10 }}>
            {[
              ['Lowest', 'surfaceContainerLowest'],
              ['Low', 'surfaceContainerLow'],
              ['Container', 'surfaceContainer'],
              ['High', 'surfaceContainerHigh'],
            ].map(([label, key]) => (
              <div key={key} style={{
                background: T[key], borderRadius: 12, padding: 14,
                display: 'flex', flexDirection: 'column', gap: 6,
                color: T.onSurface,
              }}>
                <div style={{ fontSize: 11, fontWeight: 600, color: T.onSurfaceVariant }}>{label}</div>
                <div style={{ fontSize: 18, fontWeight: 600, letterSpacing: '-0.02em', fontVariantNumeric: 'tabular-nums' }}>$12,480</div>
                <div style={{ fontSize: 11, color: T.onSurfaceMuted }}>This week</div>
              </div>
            ))}
          </div>
        </div>

        {/* Status badges */}
        <div>
          <div style={{ fontSize: 10, fontWeight: 600, letterSpacing: '0.12em', textTransform: 'uppercase', color: T.onSurfaceMuted, marginBottom: 10 }}>Status badges</div>
          <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
            <Bdg T={T} bg="successContainer" fg="onSuccessContainer">Active</Bdg>
            <Bdg T={T} bg="warningContainer" fg="onWarningContainer">Pending</Bdg>
            <Bdg T={T} bg="errorContainer" fg="onErrorContainer">Cancelled</Bdg>
            <Bdg T={T} bg="infoContainer" fg="onInfoContainer">Ongoing</Bdg>
            <Bdg T={T} bg="surfaceContainerHigh" fg="onSurfaceVariant">Inactive</Bdg>
          </div>
        </div>

        {/* Transaction type chips */}
        <div>
          <div style={{ fontSize: 10, fontWeight: 600, letterSpacing: '0.12em', textTransform: 'uppercase', color: T.onSurfaceMuted, marginBottom: 10 }}>Transaction types</div>
          <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
            <Bdg T={T} bg="txTitheBg" fg="txTitheFg">Tithe</Bdg>
            <Bdg T={T} bg="txOfferingBg" fg="txOfferingFg">Offering</Bdg>
            <Bdg T={T} bg="txMissionBg" fg="txMissionFg">Mission</Bdg>
            <Bdg T={T} bg="txFirstFruitBg" fg="txFirstFruitFg">First Fruit</Bdg>
            <Bdg T={T} bg="txCommitmentBg" fg="txCommitmentFg">Commitment</Bdg>
            <Bdg T={T} bg="txDonationBg" fg="txDonationFg">Donation</Bdg>
            <Bdg T={T} bg="txOtherBg" fg="txOtherFg">Other</Bdg>
          </div>
        </div>

        {/* Input */}
        <div>
          <div style={{ fontSize: 10, fontWeight: 600, letterSpacing: '0.12em', textTransform: 'uppercase', color: T.onSurfaceMuted, marginBottom: 10 }}>Input</div>
          <div style={{
            display: 'flex', alignItems: 'center', gap: 10,
            background: T.surfaceContainerHigh, borderRadius: 12,
            padding: '0 14px', height: 44, color: T.onSurface,
          }}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={T.onSurfaceMuted} strokeWidth="1.6" strokeLinecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
            <span style={{ fontSize: 14, color: T.onSurface }}>sarah@grace.org</span>
            <span style={{ marginLeft: 'auto', fontSize: 11, color: T.onSurfaceMuted, padding: '2px 8px', background: T.surfaceContainer, borderRadius: 6 }} className="mono">⌘K</span>
          </div>
        </div>
      </div>
    );

    // =========================================================================
    // PAGE MOCKUP — mini app shell preview, light + dark
    // =========================================================================

    const MiniDashboard = ({ T, mode }) => (
      <div style={{
        background: T.surface, color: T.onSurface,
        borderRadius: 16, overflow: 'hidden',
        display: 'grid', gridTemplateColumns: '180px 1fr',
        height: 360,
      }}>
        {/* Sidebar */}
        <div style={{
          background: T.surfaceContainerLowest,
          padding: '16px 12px', display: 'flex', flexDirection: 'column', gap: 10,
        }}>
          <div style={{
            display: 'flex', alignItems: 'center', gap: 8,
            background: T.surfaceContainerLow, borderRadius: 10, padding: '8px 10px',
          }}>
            <div style={{
              width: 24, height: 24, borderRadius: 6,
              background: `linear-gradient(135deg, #4F46E5, #3525CD)`,
              display: 'grid', placeItems: 'center', color: '#fff', fontSize: 10, fontWeight: 600,
            }}>GC</div>
            <div style={{ fontSize: 11, fontWeight: 600, color: T.onSurface }}>Grace</div>
          </div>
          {[
            { label: 'Dashboard', active: true },
            { label: 'Members' },
            { label: 'Events' },
            { label: 'Reports' },
          ].map(i => (
            <div key={i.label} style={{
              padding: '7px 10px', borderRadius: 9999,
              background: i.active ? T.primaryFixed : 'transparent',
              color: i.active ? T.onPrimaryFixed : T.onSurfaceVariant,
              fontSize: 12, fontWeight: i.active ? 600 : 500,
            }}>{i.label}</div>
          ))}
        </div>

        {/* Content */}
        <div style={{ padding: 18, display: 'flex', flexDirection: 'column', gap: 12, overflow: 'hidden' }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
            <div>
              <div style={{ fontSize: 9, fontWeight: 600, letterSpacing: '0.12em', textTransform: 'uppercase', color: T.onSurfaceMuted }}>Dashboard</div>
              <div style={{ fontSize: 18, fontWeight: 600, letterSpacing: '-0.02em', color: T.onSurface, marginTop: 2 }}>Good morning, Sarah</div>
            </div>
            <Btn T={T} kind="primary">+ Record gift</Btn>
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 8 }}>
            {[
              { label: 'This week', value: '$12,480', delta: '+8.2%' },
              { label: 'Members', value: '342', delta: '+4' },
              { label: 'Pending', value: '17', delta: '−3' },
            ].map(s => (
              <div key={s.label} style={{
                background: T.surfaceContainerLowest, borderRadius: 10, padding: 12,
              }}>
                <div style={{ fontSize: 9, fontWeight: 600, letterSpacing: '0.1em', textTransform: 'uppercase', color: T.onSurfaceMuted }}>{s.label}</div>
                <div style={{ fontSize: 20, fontWeight: 600, color: T.onSurface, marginTop: 4, fontVariantNumeric: 'tabular-nums', letterSpacing: '-0.02em' }}>{s.value}</div>
                <div style={{ fontSize: 10, color: T.txOfferingFg, marginTop: 4 }}>{s.delta}</div>
              </div>
            ))}
          </div>

          <div style={{ background: T.surfaceContainerLowest, borderRadius: 10, padding: 12, flex: 1, display: 'flex', flexDirection: 'column', gap: 8 }}>
            <div style={{ fontSize: 11, fontWeight: 600, color: T.onSurfaceVariant }}>Recent gifts</div>
            {[
              { who: 'Maria S.', type: 'Tithe', amt: '$120' },
              { who: 'Daniel K.', type: 'Offering', amt: '$45' },
              { who: 'Joy M.', type: 'Mission', amt: '$200' },
            ].map((r, i) => {
              const typeMap = { Tithe: ['txTitheBg','txTitheFg'], Offering:['txOfferingBg','txOfferingFg'], Mission:['txMissionBg','txMissionFg'] };
              const [bg, fg] = typeMap[r.type];
              return (
                <div key={i} style={{
                  display: 'flex', alignItems: 'center', gap: 10,
                  padding: '6px 0',
                  borderTop: i ? `1px solid ${T.outlineVariant}` : 'none',
                }}>
                  <div style={{ flex: 1, fontSize: 12, color: T.onSurface }}>{r.who}</div>
                  <Bdg T={T} bg={bg} fg={fg}>{r.type}</Bdg>
                  <div style={{ fontSize: 12, fontWeight: 600, color: T.onSurface, fontVariantNumeric: 'tabular-nums', minWidth: 56, textAlign: 'right' }}>{r.amt}</div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    );

    // =========================================================================
    // PAGE
    // =========================================================================

    const ModeSection = ({ mode, T, children }) => (
      <Block T={T} mode={mode}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 28 }}>
          <ModeBadge mode={mode} T={T} />
          <div style={{ fontSize: 11, color: T.onSurfaceMuted }} className="mono">
            {mode === 'light' ? 'Default · prefers-color-scheme: light' : 'Inverted · prefers-color-scheme: dark'}
          </div>
        </div>
        {children}
      </Block>
    );

    const App = () => (
      <div style={{ maxWidth: 1440, margin: '0 auto', padding: '40px 24px 64px' }}>
        {/* Hero */}
        <header style={{
          marginBottom: 24, padding: '40px 48px', borderRadius: 24,
          background: 'linear-gradient(135deg, #E6E6FA 0%, #FFFFFF 50%, #FBE9DD 110%)',
        }}>
          <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: '0.12em', textTransform: 'uppercase', color: '#7E3000', marginBottom: 10 }}>ChurchFlow · Sanctuary</div>
          <h1 style={{ fontSize: 44, fontWeight: 600, letterSpacing: '-0.03em', margin: 0, lineHeight: 1.1, maxWidth: 920, color: '#191C1E' }}>
            Complete color palette —{' '}
            <span style={{ background: 'linear-gradient(135deg, #4F46E5, #3525CD)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>light</span>
            {' '}&{' '}
            <span style={{ background: 'linear-gradient(135deg, #2D3136, #0A0C0E)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>dark</span>
            {' '}for every component & page.
          </h1>
          <p style={{ fontSize: 15, color: '#42474E', maxWidth: 820, lineHeight: 1.6, marginTop: 14, marginBottom: 0 }}>
            Every token has a paired light + dark value. Components reference tokens by name, so the same JSX renders correctly under either theme. Brand hue stays Indigo · Clay; surfaces invert; status containers deepen with light foregrounds.
          </p>
        </header>

        {/* 01 — Semantic tokens, side by side */}
        <div style={{
          display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16, marginBottom: 24,
        }}>
          <ModeSection mode="light" T={LIGHT}>
            <SectionTitle T={LIGHT} eyebrow="01 · Semantic tokens" title="Light mode" sub="The default theme. Warm-cool neutrals on white surfaces, indigo brand, deep readable text. Mirrors tokens.js." />
            <SemanticGrid T={LIGHT} mode="light" />
          </ModeSection>
          <ModeSection mode="dark" T={DARK}>
            <SectionTitle T={DARK} eyebrow="01 · Semantic tokens" title="Dark mode" sub="Cool-black surfaces stepping up by elevation. Brand & status hues lighten; containers deepen with light foregrounds for legibility." />
            <SemanticGrid T={DARK} mode="dark" />
          </ModeSection>
        </div>

        {/* 02 — Transaction types */}
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16, marginBottom: 24 }}>
          <ModeSection mode="light" T={LIGHT}>
            <SectionTitle T={LIGHT} eyebrow="02 · Transaction types" title="Type palette · light" sub="Each gift type carries a base hue, a tinted bg, and a darker fg for the badge — used in TypeBadge and chart legends." />
            <TxnPalette T={LIGHT} />
          </ModeSection>
          <ModeSection mode="dark" T={DARK}>
            <SectionTitle T={DARK} eyebrow="02 · Transaction types" title="Type palette · dark" sub="Same hues, inverted: brightened base, deep saturated bg, light fg. Hue identity preserved across modes." />
            <TxnPalette T={DARK} />
          </ModeSection>
        </div>

        {/* 03 — Components */}
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16, marginBottom: 24 }}>
          <ModeSection mode="light" T={LIGHT}>
            <SectionTitle T={LIGHT} eyebrow="03 · Components" title="Components · light" sub="Buttons, surfaces, status badges, transaction chips, and input — all driven from the same tokens." />
            <ComponentPreview T={LIGHT} mode="light" />
          </ModeSection>
          <ModeSection mode="dark" T={DARK}>
            <SectionTitle T={DARK} eyebrow="03 · Components" title="Components · dark" sub="Identical components reading dark-mode tokens. Filled-primary keeps its indigo gradient; everything else recolors." />
            <ComponentPreview T={DARK} mode="dark" />
          </ModeSection>
        </div>

        {/* 04 — Page mockup */}
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16, marginBottom: 24 }}>
          <ModeSection mode="light" T={LIGHT}>
            <SectionTitle T={LIGHT} eyebrow="04 · Pages" title="Admin dashboard · light" sub="Mini preview applying tokens at the page level — sidebar, top header, stat cards, table row with type badges." />
            <MiniDashboard T={LIGHT} mode="light" />
          </ModeSection>
          <ModeSection mode="dark" T={DARK}>
            <SectionTitle T={DARK} eyebrow="04 · Pages" title="Admin dashboard · dark" sub="Same composition, dark tokens. Sidebar uses surfaceContainerLowest; cards step up via the elevation scale." />
            <MiniDashboard T={DARK} mode="dark" />
          </ModeSection>
        </div>

        {/* 05 — Mapping recipe (dark on dark, full width) */}
        <Block T={DARK} mode="dark">
          <SectionTitle T={DARK} eyebrow="05 · Token contract" title="Light → Dark mapping rules" sub="The transformation isn't ad-hoc — every dark token is derived from its light counterpart by one of these rules." />
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 12 }}>
            {[
              { rule: 'Surfaces invert', light: 'surfaceContainerLowest #FFFFFF', dark: 'surfaceContainerLowest #0A0C0E', note: 'Stepped UP in lightness with elevation (M3 model). Deeper = lower; brighter = higher.' },
              { rule: 'Foreground inverts', light: 'onSurface #191C1E', dark: 'onSurface #E4E7EB', note: 'High-contrast text. Variant + muted are likewise mirrored across the lightness axis.' },
              { rule: 'Brand lightens', light: 'primary #3525CD', dark: 'primary #A29DEE', note: 'Use the 300 stop from the indigo ramp so it stays legible on dark surfaces. Filled CTAs keep gradient.' },
              { rule: 'Containers deepen', light: 'primaryFixed #E6E6FA', dark: 'primaryFixed #1F1583', note: 'Tinted backgrounds become deep brand-tinted. Their on-color flips to a light tint.' },
              { rule: 'Status hues lighten', light: 'success #156B3D', dark: 'success #71D295', note: 'Status base colors jump 3 stops up the ramp. Containers drop 3 stops for the inverted background pattern.' },
              { rule: 'Outlines soften', light: 'outlineVariant #C2C7CE', dark: 'outlineVariant #2D3136', note: 'Hairlines should never blast — borders use the surfaceContainerHighest equivalent on dark.' },
            ].map(m => (
              <div key={m.rule} style={{
                background: DARK.surfaceContainerLow, borderRadius: 12, padding: 18,
                display: 'flex', flexDirection: 'column', gap: 8,
              }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: DARK.onSurface, letterSpacing: '-0.005em' }}>{m.rule}</div>
                <div className="mono" style={{ fontSize: 10.5, lineHeight: 1.7, color: DARK.onSurfaceVariant }}>
                  <div>L · {m.light}</div>
                  <div>D · {m.dark}</div>
                </div>
                <div style={{ fontSize: 12, color: DARK.onSurfaceMuted, lineHeight: 1.5 }}>{m.note}</div>
              </div>
            ))}
          </div>
        </Block>
      </div>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
