<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ChurchFlow — Button Palettes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; background: #F1F3F6; color: #191C1E; -webkit-font-smoothing: antialiased; }
    * { box-sizing: border-box; }
    .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    button.btn { font-family: inherit; cursor: pointer; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // ============ SANCTUARY BUTTON PALETTES ============

    // Role × scale palettes. Every role exposes the same shape so the
    // recipes below can swap roles freely.
    const palettes = {
      // PRIMARY — Indigo. The product's signature gradient.
      primary: {
        label: 'Primary · Indigo',
        usage: 'Default CTA. Save, Continue, Record gift, Sign in.',
        scale: {
          50:  '#EEEEFC',
          100: '#E0E0FA',
          200: '#C5C2F5',
          300: '#A29DEE',
          400: '#7B72E8',
          500: '#4F46E5',  // primaryContainer — gradient start
          600: '#3525CD',  // primary — base, gradient end
          700: '#2A1DA8',
          800: '#1F1583',
          900: '#150E5C',
        },
        gradient: ['#4F46E5', '#3525CD'],
        on: '#FFFFFF',
        soft:    { bg: '#EEEEFC', fg: '#3525CD' },
        softHv:  { bg: '#E0E0FA', fg: '#2A1DA8' },
        tonal:   { bg: '#E6E6FA', fg: '#2A1DA8' }, // primaryFixed
        tonalHv: { bg: '#C5C2F5', fg: '#1F1583' },
      },
      // SECONDARY — Slate. Quiet neutral for "Cancel", chips, secondary actions.
      secondary: {
        label: 'Secondary · Slate',
        usage: 'Cancel, secondary action, low-emphasis confirm.',
        scale: {
          50:  '#F7F9FB',
          100: '#F1F3F6',
          200: '#E4E7EB',
          300: '#C2C7CE',
          400: '#9AA1A9',
          500: '#72787E',
          600: '#42474E',
          700: '#2E3338',
          800: '#1F2227',
          900: '#191C1E',
        },
        gradient: null,
        on: '#FFFFFF',
        soft:    { bg: '#F1F3F6', fg: '#42474E' },
        softHv:  { bg: '#E4E7EB', fg: '#2E3338' },
        tonal:   { bg: '#E4E7EB', fg: '#191C1E' },
        tonalHv: { bg: '#C2C7CE', fg: '#191C1E' },
      },
      // TERTIARY — Warm clay. Used for "thank you" moments. Rare, intentional.
      tertiary: {
        label: 'Tertiary · Clay',
        usage: 'Thank-you receipts, gratitude moments. Use sparingly.',
        scale: {
          50:  '#FFF4ED',
          100: '#FBE9DD',  // tertiaryContainer
          200: '#F6D2B5',
          300: '#EFB585',
          400: '#E08F4D',
          500: '#C66E20',
          600: '#A04E0F',
          700: '#7E3000',  // tertiary
          800: '#5E2300',
          900: '#3F1700',
        },
        gradient: ['#C66E20', '#7E3000'],
        on: '#FFFFFF',
        soft:    { bg: '#FFF4ED', fg: '#7E3000' },
        softHv:  { bg: '#FBE9DD', fg: '#5E2300' },
        tonal:   { bg: '#FBE9DD', fg: '#7E3000' },
        tonalHv: { bg: '#F6D2B5', fg: '#5E2300' },
      },
      // SUCCESS — Forest green.
      success: {
        label: 'Success · Forest',
        usage: 'Confirmation, "Saved", positive deltas.',
        scale: {
          50:  '#ECFDF3',
          100: '#C8EFD4',  // successContainer
          200: '#A1E3B8',
          300: '#71D295',
          400: '#3FB872',
          500: '#1F9A56',
          600: '#156B3D',  // success
          700: '#0F4D2C',
          800: '#0A381F',
          900: '#062414',
        },
        gradient: ['#1F9A56', '#156B3D'],
        on: '#FFFFFF',
        soft:    { bg: '#ECFDF3', fg: '#156B3D' },
        softHv:  { bg: '#C8EFD4', fg: '#0F4D2C' },
        tonal:   { bg: '#C8EFD4', fg: '#0F4D2C' },
        tonalHv: { bg: '#A1E3B8', fg: '#0F4D2C' },
      },
      // WARNING — Honey amber. For "Mark inactive", flagged states.
      warning: {
        label: 'Warning · Honey',
        usage: 'Caution, flagged actions ("Mark inactive").',
        scale: {
          50:  '#FFFBEB',
          100: '#FDE8B8',  // warningContainer
          200: '#FBD77F',
          300: '#F4BC3F',
          400: '#D9970F',
          500: '#B07700',
          600: '#8B5A00',  // warning
          700: '#6B4500',
          800: '#4D3200',
          900: '#332100',
        },
        gradient: ['#D9970F', '#8B5A00'],
        on: '#FFFFFF',
        soft:    { bg: '#FFFBEB', fg: '#8B5A00' },
        softHv:  { bg: '#FDE8B8', fg: '#6B4500' },
        tonal:   { bg: '#FDE8B8', fg: '#6B4500' },
        tonalHv: { bg: '#FBD77F', fg: '#6B4500' },
      },
      // DANGER — Brick red. Destructive, irreversible.
      danger: {
        label: 'Danger · Brick',
        usage: 'Destructive · Delete, Suspend, Remove. Confirm before firing.',
        scale: {
          50:  '#FDEDEC',
          100: '#F9DEDC',  // errorContainer
          200: '#F2B8B5',
          300: '#E68B86',
          400: '#D45B54',
          500: '#B72F29',
          600: '#8C1D18',  // error
          700: '#6B130F',
          800: '#4D0B08',
          900: '#330603',
        },
        gradient: ['#B72F29', '#8C1D18'],
        on: '#FFFFFF',
        soft:    { bg: '#FDEDEC', fg: '#8C1D18' },
        softHv:  { bg: '#F9DEDC', fg: '#6B130F' },
        tonal:   { bg: '#F9DEDC', fg: '#6B130F' },
        tonalHv: { bg: '#F2B8B5', fg: '#6B130F' },
      },
      // INFO — Blue. Neutral informational confirms.
      info: {
        label: 'Info · Blue',
        usage: 'Informational confirms, "Learn more".',
        scale: {
          50:  '#EFF5FE',
          100: '#D6E6FB',  // infoContainer
          200: '#AFCDF7',
          300: '#80AFEE',
          400: '#4F8AE0',
          500: '#2A66C7',
          600: '#1B4C8C',  // info
          700: '#143768',
          800: '#0D2647',
          900: '#07182E',
        },
        gradient: ['#2A66C7', '#1B4C8C'],
        on: '#FFFFFF',
        soft:    { bg: '#EFF5FE', fg: '#1B4C8C' },
        softHv:  { bg: '#D6E6FB', fg: '#143768' },
        tonal:   { bg: '#D6E6FB', fg: '#143768' },
        tonalHv: { bg: '#AFCDF7', fg: '#143768' },
      },
    };

    // ============ ATOMS ============

    const Section = ({ title, eyebrow, sub, children, pad = 40 }) => (
      <section style={{ padding: `${pad}px 56px`, background: '#FFFFFF', borderRadius: 24, marginBottom: 24 }}>
        {eyebrow && <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: '0.1em', textTransform: 'uppercase', color: '#7E3000', marginBottom: 10 }}>{eyebrow}</div>}
        <h2 style={{ fontSize: 30, fontWeight: 600, letterSpacing: '-0.025em', margin: 0, lineHeight: 1.15 }}>{title}</h2>
        {sub && <p style={{ fontSize: 14, color: '#42474E', maxWidth: 720, lineHeight: 1.6, marginTop: 10, marginBottom: 0 }}>{sub}</p>}
        <div style={{ marginTop: 32 }}>{children}</div>
      </section>
    );

    const Swatch = ({ name, hex, ramp = '500', isOn }) => {
      const dark = ['600','700','800','900'].includes(ramp);
      return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 0 }}>
          <div style={{
            height: 64, borderRadius: 12, background: hex,
            boxShadow: 'inset 0 0 0 1px rgba(0,0,0,0.06)',
            display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between',
            padding: 10, color: dark ? '#fff' : '#191C1E',
            fontSize: 11, fontWeight: 500,
          }}>
            <span style={{ opacity: 0.85 }}>{name}</span>
            <span className="mono" style={{ fontSize: 10, opacity: 0.7 }}>{hex.toUpperCase()}</span>
          </div>
        </div>
      );
    };

    const Ramp = ({ palette }) => {
      const stops = ['50','100','200','300','400','500','600','700','800','900'];
      return (
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(10, 1fr)', gap: 6 }}>
          {stops.map(s => <Swatch key={s} name={s} hex={palette.scale[s]} ramp={s} />)}
        </div>
      );
    };

    // ============ BUTTONS ============
    const baseBtn = {
      border: 'none', borderRadius: 10, padding: '12px 20px',
      fontSize: 14, fontWeight: 500, letterSpacing: '-0.005em',
      display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 8,
      transition: 'all 120ms ease', whiteSpace: 'nowrap',
    };

    const Filled = ({ p, state = 'rest', children = 'Save changes' }) => {
      const styles = {
        rest:   { background: p.scale[600], color: p.on, boxShadow: `0 1px 0 ${p.scale[700]}` },
        hover:  { background: p.scale[700], color: p.on, boxShadow: `0 2px 4px ${p.scale[800]}33` },
        pressed:{ background: p.scale[800], color: p.on, boxShadow: 'none', transform: 'translateY(1px)' },
        focus:  { background: p.scale[600], color: p.on, boxShadow: `0 0 0 3px ${p.scale[200]}` },
        disabled:{ background: '#E4E7EB', color: '#9AA1A9', cursor: 'not-allowed' },
      };
      return <button className="btn" style={{ ...baseBtn, ...styles[state] }}>{children}</button>;
    };

    const Gradient = ({ p, state = 'rest', children = 'Record gift' }) => {
      if (!p.gradient) return <Filled p={p} state={state}>{children}</Filled>;
      const [a, b] = p.gradient;
      const styles = {
        rest:   { background: `linear-gradient(135deg, ${a}, ${b})`, color: p.on, boxShadow: `0 6px 16px -4px ${b}55` },
        hover:  { background: `linear-gradient(135deg, ${a}, ${b})`, color: p.on, boxShadow: `0 10px 24px -4px ${b}80`, transform: 'translateY(-1px)' },
        pressed:{ background: `linear-gradient(135deg, ${b}, ${b})`, color: p.on, boxShadow: `0 2px 6px -2px ${b}55`, transform: 'translateY(1px)' },
        focus:  { background: `linear-gradient(135deg, ${a}, ${b})`, color: p.on, boxShadow: `0 0 0 3px ${p.scale[200]}, 0 6px 16px -4px ${b}55` },
        disabled:{ background: '#E4E7EB', color: '#9AA1A9', cursor: 'not-allowed' },
      };
      return <button className="btn" style={{ ...baseBtn, ...styles[state] }}>{children}</button>;
    };

    const Soft = ({ p, state = 'rest', children = 'Filter' }) => {
      const styles = {
        rest:   { background: p.soft.bg, color: p.soft.fg },
        hover:  { background: p.softHv.bg, color: p.softHv.fg },
        pressed:{ background: p.tonal.bg, color: p.tonal.fg, transform: 'translateY(1px)' },
        focus:  { background: p.soft.bg, color: p.soft.fg, boxShadow: `0 0 0 3px ${p.scale[200]}` },
        disabled:{ background: '#F1F3F6', color: '#9AA1A9', cursor: 'not-allowed' },
      };
      return <button className="btn" style={{ ...baseBtn, ...styles[state] }}>{children}</button>;
    };

    const Tonal = ({ p, state = 'rest', children = 'Edit' }) => {
      const styles = {
        rest:   { background: p.tonal.bg, color: p.tonal.fg },
        hover:  { background: p.tonalHv.bg, color: p.tonalHv.fg },
        pressed:{ background: p.scale[300], color: p.tonal.fg, transform: 'translateY(1px)' },
        focus:  { background: p.tonal.bg, color: p.tonal.fg, boxShadow: `0 0 0 3px ${p.scale[200]}` },
        disabled:{ background: '#F1F3F6', color: '#9AA1A9', cursor: 'not-allowed' },
      };
      return <button className="btn" style={{ ...baseBtn, ...styles[state] }}>{children}</button>;
    };

    const Outline = ({ p, state = 'rest', children = 'Cancel' }) => {
      const styles = {
        rest:   { background: 'transparent', color: p.scale[700], boxShadow: `inset 0 0 0 1px ${p.scale[300]}` },
        hover:  { background: p.scale[50], color: p.scale[800], boxShadow: `inset 0 0 0 1px ${p.scale[400]}` },
        pressed:{ background: p.scale[100], color: p.scale[800], boxShadow: `inset 0 0 0 1px ${p.scale[500]}`, transform: 'translateY(1px)' },
        focus:  { background: 'transparent', color: p.scale[700], boxShadow: `inset 0 0 0 1px ${p.scale[400]}, 0 0 0 3px ${p.scale[200]}` },
        disabled:{ background: 'transparent', color: '#9AA1A9', boxShadow: `inset 0 0 0 1px #C2C7CE`, cursor: 'not-allowed' },
      };
      return <button className="btn" style={{ ...baseBtn, ...styles[state] }}>{children}</button>;
    };

    const Ghost = ({ p, state = 'rest', children = 'Skip' }) => {
      const styles = {
        rest:   { background: 'transparent', color: p.scale[700] },
        hover:  { background: p.scale[50], color: p.scale[800] },
        pressed:{ background: p.scale[100], color: p.scale[800], transform: 'translateY(1px)' },
        focus:  { background: 'transparent', color: p.scale[700], boxShadow: `0 0 0 3px ${p.scale[200]}` },
        disabled:{ background: 'transparent', color: '#9AA1A9', cursor: 'not-allowed' },
      };
      return <button className="btn" style={{ ...baseBtn, ...styles[state] }}>{children}</button>;
    };

    // ============ LAYOUT ============

    const StateGrid = ({ p, Recipe, label, defaultLabel }) => (
      <div style={{ background: '#F7F9FB', borderRadius: 16, padding: 20 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 16 }}>
          <div style={{ fontSize: 13, fontWeight: 600, letterSpacing: '-0.005em' }}>{label}</div>
          <div className="mono" style={{ fontSize: 10, color: '#6B7280' }}>5 states</div>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: 14 }}>
          {['rest','hover','pressed','focus','disabled'].map(s => (
            <div key={s} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8 }}>
              <Recipe p={p} state={s}>{defaultLabel}</Recipe>
              <span className="mono" style={{ fontSize: 10, color: '#6B7280', textTransform: 'uppercase', letterSpacing: '0.06em' }}>{s}</span>
            </div>
          ))}
        </div>
      </div>
    );

    const RoleCard = ({ p }) => (
      <div style={{ background: '#FFFFFF', borderRadius: 24, padding: 36, boxShadow: 'inset 0 0 0 1px #ECEEF0' }}>
        {/* Header */}
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 24 }}>
          <div>
            <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: '0.1em', textTransform: 'uppercase', color: '#7E3000', marginBottom: 8 }}>Role</div>
            <h3 style={{ fontSize: 24, fontWeight: 600, letterSpacing: '-0.02em', margin: 0 }}>{p.label}</h3>
            <p style={{ fontSize: 13, color: '#42474E', maxWidth: 480, marginTop: 6, marginBottom: 0, lineHeight: 1.5 }}>{p.usage}</p>
          </div>
          {/* Hero preview */}
          <div style={{ display: 'flex', gap: 10 }}>
            <Filled p={p} />
            <Soft p={p}>Filter</Soft>
          </div>
        </div>

        {/* Color ramp */}
        <div style={{ marginBottom: 28 }}>
          <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: '0.08em', textTransform: 'uppercase', color: '#6B7280', marginBottom: 10 }}>Scale · 50 → 900</div>
          <Ramp palette={p} />
        </div>

        {/* All recipes × all states */}
        <div style={{ display: 'grid', gridTemplateColumns: '1fr', gap: 14 }}>
          <StateGrid p={p} Recipe={Filled} label="Filled — solid base" defaultLabel="Save" />
          {p.gradient && <StateGrid p={p} Recipe={Gradient} label="Gradient — primary CTA" defaultLabel="Continue" />}
          <StateGrid p={p} Recipe={Soft} label="Soft — low emphasis" defaultLabel="Filter" />
          <StateGrid p={p} Recipe={Tonal} label="Tonal — medium emphasis" defaultLabel="Edit" />
          <StateGrid p={p} Recipe={Outline} label="Outline — bordered" defaultLabel="Cancel" />
          <StateGrid p={p} Recipe={Ghost} label="Ghost — text-only" defaultLabel="Skip" />
        </div>

        {/* Token recipe */}
        <div style={{ marginTop: 24, padding: 18, background: '#191C1E', borderRadius: 12, color: '#E4E7EB', fontSize: 12, lineHeight: 1.7 }}>
          <div style={{ color: '#9AA1A9', fontSize: 10, fontWeight: 600, letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 8 }}>Recipe</div>
          <div className="mono" style={{ whiteSpace: 'pre' }}>
            {`bg-rest:    ${p.scale[600]}\nbg-hover:   ${p.scale[700]}\nbg-pressed: ${p.scale[800]}\nfocus-ring: ${p.scale[200]}  · 3px outset\non-color:   ${p.on}\nsoft-bg:    ${p.soft.bg}  →  fg ${p.soft.fg}\ntonal-bg:   ${p.tonal.bg}  →  fg ${p.tonal.fg}\ndisabled:   #E4E7EB on #9AA1A9`}
          </div>
        </div>
      </div>
    );

    // Special: Anatomy
    const Anatomy = () => (
      <div style={{ display: 'grid', gridTemplateColumns: '1.1fr 1fr', gap: 24 }}>
        <div style={{ background: '#F7F9FB', borderRadius: 16, padding: 28 }}>
          <div style={{ fontSize: 12, fontWeight: 600, letterSpacing: '0.06em', textTransform: 'uppercase', color: '#6B7280', marginBottom: 16 }}>Sizes</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
            {[
              { sz: 'sm', pad: '8px 14px', fs: 13, h: 32, copy: 'Action' },
              { sz: 'md', pad: '12px 20px', fs: 14, h: 40, copy: 'Save changes' },
              { sz: 'lg', pad: '16px 28px', fs: 15, h: 52, copy: 'Continue with Google' },
            ].map(s => (
              <div key={s.sz} style={{ display: 'flex', alignItems: 'center', gap: 24 }}>
                <span className="mono" style={{ fontSize: 11, color: '#6B7280', width: 32 }}>{s.sz}</span>
                <button className="btn" style={{
                  ...baseBtn, padding: s.pad, fontSize: s.fs,
                  background: 'linear-gradient(135deg, #4F46E5, #3525CD)', color: '#fff',
                  boxShadow: '0 6px 16px -4px rgba(53,37,205,0.4)',
                }}>{s.copy}</button>
                <span className="mono" style={{ fontSize: 11, color: '#6B7280' }}>{s.h}px / {s.fs}px</span>
              </div>
            ))}
          </div>
        </div>

        <div style={{ background: '#F7F9FB', borderRadius: 16, padding: 28 }}>
          <div style={{ fontSize: 12, fontWeight: 600, letterSpacing: '0.06em', textTransform: 'uppercase', color: '#6B7280', marginBottom: 16 }}>Shapes</div>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 12 }}>
            {[
              { r: 6, l: 'Sharp · 6px' },
              { r: 10, l: 'Default · 10px' },
              { r: 14, l: 'Soft · 14px' },
              { r: 9999, l: 'Pill' },
            ].map(s => (
              <div key={s.r} style={{ display: 'flex', flexDirection: 'column', gap: 6, alignItems: 'flex-start' }}>
                <button className="btn" style={{
                  ...baseBtn, borderRadius: s.r,
                  background: 'linear-gradient(135deg, #4F46E5, #3525CD)', color: '#fff',
                  boxShadow: '0 6px 16px -4px rgba(53,37,205,0.4)',
                }}>Continue</button>
                <span className="mono" style={{ fontSize: 10, color: '#6B7280' }}>{s.l}</span>
              </div>
            ))}
          </div>

          <div style={{ fontSize: 12, fontWeight: 600, letterSpacing: '0.06em', textTransform: 'uppercase', color: '#6B7280', marginTop: 28, marginBottom: 16 }}>With icon</div>
          <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap' }}>
            <button className="btn" style={{ ...baseBtn, background: 'linear-gradient(135deg, #4F46E5, #3525CD)', color: '#fff', boxShadow: '0 6px 16px -4px rgba(53,37,205,0.4)' }}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>
              Record gift
            </button>
            <button className="btn" style={{ ...baseBtn, background: '#EEEEFC', color: '#3525CD' }}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M3 6h18M6 12h12M10 18h4"/></svg>
              Filter
            </button>
            <button className="btn" style={{ ...baseBtn, background: 'transparent', color: '#42474E', boxShadow: 'inset 0 0 0 1px #C2C7CE' }}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              Send
            </button>
            <button className="btn" style={{
              ...baseBtn, padding: 0, width: 40, height: 40, borderRadius: '50%',
              background: 'linear-gradient(135deg, #4F46E5, #3525CD)', color: '#fff',
              boxShadow: '0 6px 16px -4px rgba(53,37,205,0.4)',
            }}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>
            </button>
          </div>
        </div>
      </div>
    );

    // Real-world pairs
    const Pair = ({ children, sub }) => (
      <div style={{ background: '#F7F9FB', borderRadius: 16, padding: 24 }}>
        <div style={{ fontSize: 12, fontWeight: 500, color: '#42474E', marginBottom: 16, lineHeight: 1.5 }}>{sub}</div>
        <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap', alignItems: 'center' }}>{children}</div>
      </div>
    );
